name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 🛠️ 智能修复：如果项目没有初始化，使用 gradle 官方命令直接强行编译
    - name: Setup Gradle and Build APK
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: wrapper
        build-root-directory: LoraReceiver
        arguments: assembleDebug
        
    - name: Upload Output APK
      uses: actions/upload-artifact@v4
      with:
        name: LoraReceiver-App
        path: LoraReceiver/app/build/outputs/apk/debug/app-debug.apk
