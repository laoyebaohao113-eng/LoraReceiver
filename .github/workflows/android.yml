name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 🛠️ 升级版本：将 8.0 升级为 8.7，完美兼容 AI 最新的安卓语法
    - name: Generate Gradle Wrapper
      run: |
        cd LoraReceiver
        gradle wrapper --gradle-version 8.7

    # 🚀 在第一层目录下强行编译打包
    - name: Compile APK
      run: |
        cd LoraReceiver
        chmod +x gradlew
        ./gradlew assembleDebug

    # 📥 从第一层目录中精准抓取生成的 APK 产物
    - name: Upload Output APK
      uses: actions/upload-artifact@v4
      with:
        name: LoraReceiver-App
        path: LoraReceiver/app/build/outputs/apk/debug/app-debug.apk
