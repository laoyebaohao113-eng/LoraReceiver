name: Build APK

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 装 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 装 Android SDK 命令行工具(并接受许可)
        uses: android-actions/setup-android@v3

      - name: 安装编译所需 SDK 组件
        run: |
          yes | sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: 准备 Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: 自动定位 DeviceProbe 工程目录
        run: |
          echo "===== 仓库根 ls ====="; ls -la
          M=$(find . -path '*com/rescue/deviceprobe/MainActivity.java' -not -path '*/.git/*' | head -1)
          if [ -n "$M" ]; then
            DIR=$(echo "$M" | sed 's#/app/src/main/java/com/rescue/deviceprobe/MainActivity.java##')
          else
            F=$(find . -name 'settings.gradle' -not -path '*/.git/*' | head -1)
            DIR=$(dirname "$F")
          fi
          if [ -z "$DIR" ] || [ ! -f "$DIR/settings.gradle" ]; then
            echo "::error::没找到 DeviceProbe 工程,文件没传上来或传错了"
            find . -maxdepth 4 -not -path './.git/*' | sort
            exit 1
          fi
          echo "找到工程目录: $DIR"
          echo "PROJECT_DIR=$DIR" >> "$GITHUB_ENV"
          ls -la "$DIR"

      - name: 编译 debug APK
        run: gradle assembleDebug --no-daemon --stacktrace -p "$PROJECT_DIR"

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: DeviceProbe-debug-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
