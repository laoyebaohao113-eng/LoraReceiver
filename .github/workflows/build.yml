name: Build APK

# 触发:推代码到任意分支、或在 Actions 页手动点 Run
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 装 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 装 Android SDK 命令行工具(并接受许可)
        uses: android-actions/setup-android@v3

      - name: 安装编译所需 SDK 组件
        run: |
          yes | sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: 准备 Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: 自动定位 SendImageNew 工程目录
        run: |
          echo "===== 仓库根 ls ====="; ls -la
          # 用本工程独有标记文件精确定位,避免仓库里有其它 gradle 工程时找错
          M=$(find . -path '*com/rescue/sendimage/MainActivity.java' -not -path '*/.git/*' | head -1)
          if [ -n "$M" ]; then
            DIR=$(echo "$M" | sed 's#/app/src/main/java/com/rescue/sendimage/MainActivity.java##')
          else
            F=$(find . -name 'settings.gradle' -not -path '*/.git/*' | head -1)
            DIR=$(dirname "$F")
          fi
          if [ -z "$DIR" ] || [ ! -f "$DIR/settings.gradle" ]; then
            echo "::error::没找到 SendImageNew 工程,文件没传上来或传错了"
            find . -maxdepth 4 -not -path './.git/*' | sort
            exit 1
          fi
          echo "找到工程目录: $DIR"
          echo "PROJECT_DIR=$DIR" >> "$GITHUB_ENV"
          ls -la "$DIR"

      - name: 下载矫正模型 carddetection.onnx(从 GitHub Release)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 模型 37.8MB,网页传不了,放在 Release 里,编译时按 tag 下载到 assets/models/
          # 需要:仓库里建一个 tag 为 models 的 Release,上传资产文件名 carddetection.onnx
          DEST="$PROJECT_DIR/app/src/main/assets/models"
          mkdir -p "$DEST"
          echo "从 Release(tag=models)下载 carddetection.onnx ..."
          gh release download models --repo "$GITHUB_REPOSITORY" --pattern 'carddetection.onnx' --dir "$DEST" --clobber
          echo "校验 sha256(必须等于旧App原始模型,否则中止)..."
          echo "ca99ed5a20c11cf1c30020a1f722fcc85f020e5cea3ce629ffb576da981bb321  $DEST/carddetection.onnx" | sha256sum -c -
          echo "模型就绪:"; ls -la "$DEST"

      - name: 编译 debug APK
        run: gradle assembleDebug --no-daemon --stacktrace -p "$PROJECT_DIR"

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: SendImageNew-debug-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
