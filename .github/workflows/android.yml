name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 🛠️ 1. 强行精准进入两层目录，下载官方标准编译脚手架
    - name: Force Generate Gradle Wrapper
      run: |
        cd LoraReceiver/LoraReceiver
        gradle wrapper --gradle-version 8.0

    # 🚀 2. 强行执行原生打包命令，不再依赖任何第三方插件路径判断
    - name: Force Compile APK
      run: |
        cd LoraReceiver/LoraReceiver
        chmod +x gradlew
        ./gradlew assembleDebug

    # 📥 3. 精准抓取生成的 APK 产物
    - name: Upload Output APK
      uses: actions/upload-artifact@v4
      with:
        name: LoraReceiver-App
        path: LoraReceiver/LoraReceiver/app/build/outputs/apk/debug/app-debug.apk
