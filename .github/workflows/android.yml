name: Android CI Build
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Setup Gradle Environment
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.7'
    - name: Compile APK via Daemon
      run: |
        cd LoraReceiver
        gradle assembleDebug --no-daemon
    - name: Upload Output APK
      uses: actions/upload-artifact@v4
      with:
        name: LoraReceiver-App
        path: LoraReceiver/app/build/outputs/apk/debug/app-debug.apk
