name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. 自动生成安卓项目必需的包装器环境文件
    - name: Set up Gradle Wrapper
      run: |
        cd LoraReceiver
        gradle wrapper

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permission for Gradlew
      run: chmod +x LoraReceiver/gradlew

    # 2. 进入二级目录进行全自动安卓编译
    - name: Build Debug APK
      run: |
        cd LoraReceiver
        ./gradlew assembleDebug

    - name: Upload Output APK
      uses: actions/upload-artifact@v4
      with:
        name: LoraReceiver-App
        path: LoraReceiver/app/build/outputs/apk/debug/app-debug.apk
