name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 🛠️ 自动在双层同名目录下生成标准的编译环境
    - name: Auto Repair Gradle Environment
      run: |
        cd LoraReceiver/LoraReceiver
        gradle wrapper --gradle-version 8.0

    # 🎯 准确指向第二层同名文件夹进行强行编译
    - name: Run Autocomplete Build
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: wrapper
        build-root-directory: LoraReceiver/LoraReceiver
        arguments: assembleDebug
        
    # 📥 准确提取打包出来的 APK 产物
    - name: Upload Output APK
      uses: actions/upload-artifact@v4
      with:
        name: LoraReceiver-App
        path: LoraReceiver/LoraReceiver/app/build/outputs/apk/debug/app-debug.apk
