name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# 所有命令进入子文件夹 netsend-client-app 执行
defaults:
  run:
    working-directory: netsend-client-app

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install deps
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Generate app icon & splash (飞翔)
        run: npx @capacitor/assets generate --iconBackgroundColor '#1677ff' --iconBackgroundColorDark '#1677ff' --splashBackgroundColor '#1677ff' --android

      - name: Sync web assets
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pid-client-apk
          path: netsend-client-app/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
