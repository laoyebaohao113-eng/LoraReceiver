name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
defaults:
  run:
    working-directory: netsend-client-app
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: android-actions/setup-android@v3
      - run: npm install
      - run: npx cap add android
      - run: npx @capacitor/assets generate --iconBackgroundColor '#1677ff' --iconBackgroundColorDark '#1677ff' --splashBackgroundColor '#1677ff' --android
      - run: npx cap sync android
      - run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: pid-client-apk
          path: netsend-client-app/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
