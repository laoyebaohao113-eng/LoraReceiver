name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 🚀 直接调用官方最新编译动作，全盘自动扫描，不使用任何本地 gradlew 脚本
    - name: Direct Build APK
      uses: gradle/actions/setup-gradle@v3
      with:
        build-root-directory: LoraReceiver/LoraReceiver
        arguments: assembleDebug

    - name: Upload Output APK
      uses: actions/upload-artifact@v4
      with:
        name: LoraReceiver-App
        path: LoraReceiver/LoraReceiver/app/build/outputs/apk/debug/app-debug.apk
