name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 🚀 使用官方最新版沙盒环境，全自动隔离并适配你项目本身的 build.gradle 版本，不再调用系统命令
    - name: Setup Gradle and Compile
      uses: gradle/actions/setup-gradle@v4
      with:
        build-root-directory: LoraReceiver
        arguments: assembleDebug

    - name: Upload Output APK
      uses: actions/upload-artifact@v4
      with:
        name: LoraReceiver-App
        path: LoraReceiver/app/build/outputs/apk/debug/app-debug.apk
